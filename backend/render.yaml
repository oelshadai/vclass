services:
  - type: web
    name: school-sasa-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn school_report_saas.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: school_report_saas.settings
      - key: DEBUG
        value: False
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: school-sasa-db
          property: connectionString