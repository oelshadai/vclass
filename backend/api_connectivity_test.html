<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Connectivity Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔧 API Connectivity Test</h1>
    <p>This tool tests the connection between frontend and backend APIs.</p>

    <div class="test-section">
        <h2>Backend Status</h2>
        <button onclick="testBackendHealth()">Test Backend Health</button>
        <div id="backend-result"></div>
    </div>

    <div class="test-section">
        <h2>Authentication Endpoints</h2>
        <button onclick="testStudentLogin()">Test Student Login Endpoint</button>
        <button onclick="testTeacherLogin()">Test Teacher Login Endpoint</button>
        <button onclick="testAdminLogin()">Test Admin Login Endpoint</button>
        <div id="auth-result"></div>
    </div>

    <div class="test-section">
        <h2>CORS Configuration</h2>
        <button onclick="testCORS()">Test CORS Headers</button>
        <div id="cors-result"></div>
    </div>

    <div class="test-section">
        <h2>PDF Generation Test</h2>
        <button onclick="testPDFEndpoint()">Test PDF Generation</button>
        <div id="pdf-result"></div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000/api';

        function showResult(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="test-result ${type}">${message}</div>`;
        }

        function showError(elementId, error) {
            const message = error.response ? 
                `❌ Error ${error.response.status}: ${JSON.stringify(error.response.data)}` :
                `❌ Network Error: ${error.message}`;
            showResult(elementId, message, 'error');
        }

        async function testBackendHealth() {
            showResult('backend-result', '🔄 Testing backend connection...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/auth/csrf-token/`, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    showResult('backend-result', 
                        `✅ Backend is running!<br>
                        Status: ${response.status}<br>
                        Response: <pre>${JSON.stringify(data, null, 2)}</pre>`, 
                        'success'
                    );
                } else {
                    showResult('backend-result', 
                        `⚠️ Backend responded with status ${response.status}<br>
                        Response: ${await response.text()}`, 
                        'error'
                    );
                }
            } catch (error) {
                showResult('backend-result', 
                    `❌ Cannot connect to backend<br>
                    Error: ${error.message}<br>
                    Make sure Django server is running on port 8000`, 
                    'error'
                );
            }
        }

        async function testStudentLogin() {
            showResult('auth-result', '🔄 Testing student login endpoint...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/auth/student-login/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    },
                    body: JSON.stringify({
                        student_id: 'TEST001',
                        password: 'testpassword'
                    })
                });
                
                const data = await response.json();
                
                if (response.status === 401 || response.status === 400) {
                    showResult('auth-result', 
                        `✅ Student login endpoint is working (expected auth failure)<br>
                        Status: ${response.status}<br>
                        Response: <pre>${JSON.stringify(data, null, 2)}</pre>`, 
                        'success'
                    );
                } else {
                    showResult('auth-result', 
                        `⚠️ Unexpected response from student login<br>
                        Status: ${response.status}<br>
                        Response: <pre>${JSON.stringify(data, null, 2)}</pre>`, 
                        'info'
                    );
                }
            } catch (error) {
                showError('auth-result', error);
            }
        }

        async function testTeacherLogin() {
            showResult('auth-result', '🔄 Testing teacher login endpoint...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/auth/teacher-login/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: 'testpassword'
                    })
                });
                
                const data = await response.json();
                
                if (response.status === 401 || response.status === 400) {
                    showResult('auth-result', 
                        `✅ Teacher login endpoint is working (expected auth failure)<br>
                        Status: ${response.status}<br>
                        Response: <pre>${JSON.stringify(data, null, 2)}</pre>`, 
                        'success'
                    );
                } else {
                    showResult('auth-result', 
                        `⚠️ Unexpected response from teacher login<br>
                        Status: ${response.status}<br>
                        Response: <pre>${JSON.stringify(data, null, 2)}</pre>`, 
                        'info'
                    );
                }
            } catch (error) {
                showError('auth-result', error);
            }
        }

        async function testAdminLogin() {
            showResult('auth-result', '🔄 Testing admin login endpoint...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/auth/admin-login/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'admin@example.com',
                        password: 'testpassword'
                    })
                });
                
                const data = await response.json();
                
                if (response.status === 401 || response.status === 400) {
                    showResult('auth-result', 
                        `✅ Admin login endpoint is working (expected auth failure)<br>
                        Status: ${response.status}<br>
                        Response: <pre>${JSON.stringify(data, null, 2)}</pre>`, 
                        'success'
                    );
                } else {
                    showResult('auth-result', 
                        `⚠️ Unexpected response from admin login<br>
                        Status: ${response.status}<br>
                        Response: <pre>${JSON.stringify(data, null, 2)}</pre>`, 
                        'info'
                    );
                }
            } catch (error) {
                showError('auth-result', error);
            }
        }

        async function testCORS() {
            showResult('cors-result', '🔄 Testing CORS configuration...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/auth/csrf-token/`, {
                    method: 'OPTIONS',
                });
                
                const corsHeaders = {
                    'Access-Control-Allow-Origin': response.headers.get('Access-Control-Allow-Origin'),
                    'Access-Control-Allow-Methods': response.headers.get('Access-Control-Allow-Methods'),
                    'Access-Control-Allow-Headers': response.headers.get('Access-Control-Allow-Headers'),
                };
                
                showResult('cors-result', 
                    `✅ CORS preflight successful<br>
                    Status: ${response.status}<br>
                    CORS Headers: <pre>${JSON.stringify(corsHeaders, null, 2)}</pre>`, 
                    'success'
                );
            } catch (error) {
                showError('cors-result', error);
            }
        }

        async function testPDFEndpoint() {
            showResult('pdf-result', '🔄 Testing PDF generation endpoint...', 'info');
            
            try {
                const response = await fetch(`${API_BASE}/reports/report-cards/template_preview/`, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                    }
                });
                
                if (response.status === 401) {
                    showResult('pdf-result', 
                        `✅ PDF endpoint is working (requires authentication)<br>
                        Status: ${response.status}<br>
                        This is expected - PDF generation requires login`, 
                        'success'
                    );
                } else if (response.ok) {
                    showResult('pdf-result', 
                        `✅ PDF endpoint is accessible<br>
                        Status: ${response.status}<br>
                        Content-Type: ${response.headers.get('Content-Type')}`, 
                        'success'
                    );
                } else {
                    const data = await response.text();
                    showResult('pdf-result', 
                        `⚠️ PDF endpoint responded with status ${response.status}<br>
                        Response: ${data}`, 
                        'info'
                    );
                }
            } catch (error) {
                showError('pdf-result', error);
            }
        }

        // Auto-run backend health check on page load
        window.addEventListener('load', () => {
            testBackendHealth();
        });
    </script>
</body>
</html>
