<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORS Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .result { margin: 20px 0; padding: 15px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        button { padding: 10px 20px; margin: 10px 0; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>CORS Test for School Report System</h1>
    <p>This page tests if CORS is properly configured between your frontend (localhost:8080) and backend (localhost:8000).</p>
    
    <button onclick="testCORS()">Test CORS Connection</button>
    <button onclick="testLogin()">Test Login Endpoint</button>
    
    <div id="results"></div>

    <script>
        const API_BASE = 'http://localhost:8000/api';
        
        function showResult(message, isSuccess = true) {
            const resultsDiv = document.getElementById('results');
            const resultDiv = document.createElement('div');
            resultDiv.className = `result ${isSuccess ? 'success' : 'error'}`;
            resultDiv.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${message}`;
            resultsDiv.appendChild(resultDiv);
        }
        
        async function testCORS() {
            try {
                showResult('Testing CORS connection...', true);
                
                const response = await fetch(`${API_BASE}/teachers/`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });
                
                if (response.ok) {
                    showResult('✅ CORS is working! Backend is accessible from frontend.', true);
                } else {
                    showResult(`⚠️ Backend responded with status: ${response.status}. CORS is working but you may need authentication.`, true);
                }
            } catch (error) {
                if (error.message.includes('CORS')) {
                    showResult(`❌ CORS Error: ${error.message}`, false);
                } else if (error.message.includes('fetch')) {
                    showResult('❌ Cannot connect to backend. Make sure Django server is running on localhost:8000', false);
                } else {
                    showResult(`❌ Error: ${error.message}`, false);
                }
            }
        }
        
        async function testLogin() {
            try {
                showResult('Testing login endpoint...', true);
                
                const response = await fetch(`${API_BASE}/accounts/login/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: 'testpassword'
                    })
                });
                
                if (response.status === 400 || response.status === 401) {
                    showResult('✅ Login endpoint is accessible! CORS is working (invalid credentials expected).', true);
                } else if (response.ok) {
                    showResult('✅ Login endpoint is working perfectly!', true);
                } else {
                    showResult(`⚠️ Login endpoint responded with status: ${response.status}`, true);
                }
            } catch (error) {
                if (error.message.includes('CORS')) {
                    showResult(`❌ CORS Error on login: ${error.message}`, false);
                } else {
                    showResult(`❌ Login test error: ${error.message}`, false);
                }
            }
        }
        
        // Auto-test on page load
        window.onload = function() {
            setTimeout(testCORS, 1000);
        };
    </script>
</body>
</html>
