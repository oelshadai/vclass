    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes, maximum-scale=5" />
    
    <!-- SEO and Meta -->
    <title>School Report SaaS - Elite Tech</title>
    <meta name="description" content="School Report SaaS by Elite Tech - Comprehensive school management system for teachers, students, and administrators. Manage classes, attendance, grades, and reports efficiently." />
    <meta name="keywords" content="school management, education, teachers, students, grades, attendance, reports, SaaS, Elite Tech" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="School Report SaaS - Elite Tech" />
    <meta property="og:description" content="Comprehensive school management system for modern education" />
    <meta property="og:image" content="/EliteTech logo with sleek design.png" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="School Report SaaS - Elite Tech" />
    <meta name="twitter:description" content="Comprehensive school management system for modern education" />
    <meta name="twitter:image" content="/EliteTech logo with sleek design.png" />
    
    <!-- PWA Meta -->
    <meta name="theme-color" content="#115e3d" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Elite Tech" />
    <meta name="application-name" content="Elite Tech" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" href="/EliteTech logo with sleek design.png" />
    <link rel="shortcut icon" type="image/png" href="/EliteTech logo with sleek design.png" />
    
    <!-- Preconnect to API domain -->
    <link rel="preconnect" href="https://school-report-saas.onrender.com" />
    <link rel="dns-prefetch" href="https://school-report-saas.onrender.com" />
    
    <!-- Critical CSS to prevent FOUC -->
    <style>
      html, body, #root {
        width: 100vw;
        height: 100vh;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        background-color: #ffffff;
      }
      
      /* Loading spinner */
      .loading-spinner {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 40px;
        height: 40px;
        border: 3px solid #e5e7eb;
        border-top: 3px solid #3ecf8e;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        z-index: 9999;
      }
      
      @keyframes spin {
        0% { transform: translate(-50%, -50%) rotate(0deg); }
        100% { transform: translate(-50%, -50%) rotate(360deg); }
      }
      
      /* Hide spinner when app loads */
      .app-loaded .loading-spinner {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading spinner shown until React app loads -->
      <div class="loading-spinner"></div>
    </div>
    
    <!-- Main app script -->
    <script type="module" src="/src/main.tsx"></script>
    

  </body>
</html>
