<!DOCTYPE html>
<html>
<head>
    <title>CORS Test</title>
</head>
<body>
    <h1>Backend CORS Test</h1>
    <button onclick="testCORS()">Test Backend Connection</button>
    <div id="result"></div>

    <script>
        async function testCORS() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                // Test basic API endpoint
                const response = await fetch('http://localhost:8000/api/auth/student-login/', {
                    method: 'OPTIONS',
                    headers: {
                        'Content-Type': 'application/json',
                        'Origin': 'http://localhost:8080'
                    }
                });
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <p style="color: green;">✅ CORS is working!</p>
                        <p>Status: ${response.status}</p>
                        <p>Headers: ${JSON.stringify([...response.headers.entries()])}</p>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <p style="color: orange;">⚠️ Server responded but with status: ${response.status}</p>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <p style="color: red;">❌ CORS Error: ${error.message}</p>
                    <p>Make sure the backend server is running on http://localhost:8000</p>
                `;
            }
        }
    </script>
</body>
</html>
